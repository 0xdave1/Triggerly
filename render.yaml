services:
  - type: web
    name: triggerly-api
    runtime: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm run start:prod
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: ENABLE_SWAGGER
        value: false
      - key: AI_PROVIDER
        value: freemodel
      - key: AI_BASE_URL
        value: https://api.freemodel.dev
      - key: AI_MODEL
        value: gpt-5.5
      - key: AI_REASONING_EFFORT
        value: xhigh
      - key: AI_DISABLE_RESPONSE_STORAGE
        value: true
      - key: OPENAI_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGINS
        sync: false
